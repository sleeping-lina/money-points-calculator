/* ============================ evaluator ============================ */
function evaluate(input) {
  if (!input || !input.trim()) return null;
  const s = input.replace(/×/g, "*").replace(/÷/g, "/").replace(/−/g, "-").replace(/,/g, "");
  let i = 0;
  const skip = () => { while (s[i] === " ") i++; };
  function parseNumber() {
    skip(); const st = i;
    while (i < s.length && /[0-9.]/.test(s[i])) i++;
    if (st === i) throw 0;
    const v = parseFloat(s.slice(st, i)); if (Number.isNaN(v)) throw 0; return v;
  }
  function parseFactor() {
    skip(); let node;
    if (s[i] === "(") { i++; const v = parseExpr(); skip(); if (s[i] === ")") i++; else throw 0; node = { value: v, percentRaw: null }; }
    else if (s[i] === "-") { i++; const f = parseFactor(); node = { value: -f.value, percentRaw: f.percentRaw === null ? null : -f.percentRaw }; }
    else if (s[i] === "+") { i++; node = parseFactor(); }
    else { node = { value: parseNumber(), percentRaw: null }; }
    skip(); if (s[i] === "%") { i++; node = { value: node.value / 100, percentRaw: node.value }; }
    return node;
  }
  function parseTerm() {
    const left = parseFactor(); let value = left.value; let solo = left.percentRaw; skip();
    while (s[i] === "*" || s[i] === "/") { const op = s[i]; i++; const r = parseFactor(); solo = null; value = op === "*" ? value * r.value : value / r.value; skip(); }
    return { value, soloPercent: solo };
  }
  function parseExpr() {
    let t = parseTerm(); let value = t.value; skip();
    while (s[i] === "+" || s[i] === "-") {
      const op = s[i]; i++; const rt = parseTerm();
      if (rt.soloPercent !== null && rt.soloPercent !== undefined) { const d = value * rt.soloPercent / 100; value = op === "+" ? value + d : value - d; }
      else { value = op === "+" ? value + rt.value : value - rt.value; }
      skip();
    }
    return value;
  }
  try { const r = parseExpr(); skip(); if (i < s.length) return null; if (!Number.isFinite(r)) return null; return r; } catch { return null; }
}

function fmt(n) {
  if (n === null || n === undefined || Number.isNaN(n) || !Number.isFinite(n)) return "—";
  const rounded = Math.round(n * 1e8) / 1e8;
  const sign = rounded < 0 ? "-" : "";
  const [intp, decp] = String(Math.abs(rounded)).split(".");
  return sign + intp.replace(/\B(?=(\d{3})+(?!\d))/g, ",") + (decp ? "." + decp : "");
}
const num = (v) => { if (v === "" || v == null) return null; const x = parseFloat(String(v).replace(/,/g, "")); return Number.isFinite(x) ? x : null; };

          if (alive && raw) {
            const d = JSON.parse(raw);
            if (d.calcHist) setCalcHist(d.calcHist);
            if (d.pctHist) setPctHist((p) => ({ ...p, ...d.pctHist }));
            if (d.p1Hist) setP1Hist(d.p1Hist);
            if (d.p2Hist) setP2Hist(d.p2Hist);
            if (typeof d.taxRate === "number") setTaxRate(d.taxRate);
          }
        }
      } catch {}
      loaded.current = true;
    })();
    return () => { alive = false; };
  }, []);
  useEffect(() => {
    if (!loaded.current) return;
    const t = setTimeout(async () => {
      try { localStorage.setItem("ml-state-v2", JSON.stringify({ calcHist, pctHist, p1Hist, p2Hist, taxRate })); } catch {}
    }, 500);
    return () => clearTimeout(t);
  }, [calcHist, pctHist, p1Hist, p2Hist, taxRate]);

  useEffect(() => { if (feedRef.current) feedRef.current.scrollTop = feedRef.current.scrollHeight; }, [calcHist, tab]);

  const liveResult = evaluate(expr);
  const insertAtCursor = (txt) => {
    const el = exprRef.current; if (!el) { setExpr((e) => e + txt); return; }
    const s = el.selectionStart ?? expr.length, e = el.selectionEnd ?? expr.length;
    const next = expr.slice(0, s) + txt + expr.slice(e); setExpr(next);
    requestAnimationFrame(() => { el.focus(); const p = s + txt.length; try { el.setSelectionRange(p, p); } catch {} });
  };
  const backspace = () => {
    const el = exprRef.current; if (!el) { setExpr((e) => e.slice(0, -1)); return; }
    const s = el.selectionStart ?? expr.length, e = el.selectionEnd ?? expr.length;
    if (s !== e) { setExpr(expr.slice(0, s) + expr.slice(e)); requestAnimationFrame(() => { try { el.setSelectionRange(s, s); } catch {} }); }
    else if (s > 0) { setExpr(expr.slice(0, s - 1) + expr.slice(s)); requestAnimationFrame(() => { try { el.setSelectionRange(s - 1, s - 1); } catch {} }); }
  };
  const doEquals = () => {
    const r = evaluate(expr); if (r === null || expr.trim() === "") return;
    setCalcHist((h) => [{ id: uid(), expr, res: fmt(r) }, ...h].slice(0, 60));
    setExpr(fmt(r).replace(/,/g, ""));
  };
  const applyTax = (kind) => {
    const r = evaluate(expr); if (r === null) { flash("数式を入力してください"); return; }
    const f = 1 + taxRate / 100; const out = kind === "in" ? r * f : r / f;
    const label = kind === "in" ? `税込${taxRate}%` : `税抜${taxRate}%`;
    setCalcHist((h) => [{ id: uid(), expr: `${fmt(r)}→${label}`, res: fmt(out) }, ...h].slice(0, 60));
    setExpr(fmt(out).replace(/,/g, "")); flash(`${label}: ${fmt(out)}`);
  };
  const negate = () => { const r = evaluate(expr); if (r != null) setExpr(fmt(-r).replace(/,/g, "")); };
  const handleKey = (k) => {
    switch (k.kind) {
      case "num": case "op": case "paren": insertAtCursor(k.val); break;
      case "clear": setExpr(""); break;
      case "back": backspace(); break;
      case "eq": doEquals(); break;
      case "neg": negate(); break;
      case "memc": setMemory(0); flash("メモリー消去"); break;
      case "memr": insertAtCursor(String(memory)); break;
      case "memp": { const r = evaluate(expr); if (r != null) { setMemory((m) => m + r); flash(`M+ ${fmt(memory + r)}`); } break; }
      case "memm": { const r = evaluate(expr); if (r != null) { setMemory((m) => m - r); flash(`M− ${fmt(memory - r)}`); } break; }
      case "taxin": applyTax("in"); break;
      case "taxout": applyTax("out"); break;
      default: break;
    }
  };
  const KEYS = [
    { l: "MC", kind: "memc", c: "mem" }, { l: "MR", kind: "memr", c: "mem" }, { l: "M−", kind: "memm", c: "mem" }, { l: "M+", kind: "memp", c: "mem" },
    { l: "AC", kind: "clear", c: "clear" }, { l: "(", kind: "paren", val: "(", c: "paren" }, { l: ")", kind: "paren", val: ")", c: "paren" }, { l: "⌫", kind: "back", c: "back" },
    { l: "%", kind: "op", val: "%", c: "pct" }, { l: "税抜", kind: "taxout", c: "tax" }, { l: "税込", kind: "taxin", c: "tax" }, { l: "÷", kind: "op", val: "÷", c: "op" },
    { l: "7", kind: "num", val: "7" }, { l: "8", kind: "num", val: "8" }, { l: "9", kind: "num", val: "9" }, { l: "×", kind: "op", val: "×", c: "op" },
    { l: "4", kind: "num", val: "4" }, { l: "5", kind: "num", val: "5" }, { l: "6", kind: "num", val: "6" }, { l: "−", kind: "op", val: "−", c: "op" },
    { l: "1", kind: "num", val: "1" }, { l: "2", kind: "num", val: "2" }, { l: "3", kind: "num", val: "3" }, { l: "+", kind: "op", val: "+", c: "op" },
    { l: "0", kind: "num", val: "0" }, { l: ".", kind: "num", val: "." }, { l: "±", kind: "neg", c: "neg" }, { l: "=", kind: "eq", c: "eq" },
  ];

  const setRowVal = (key, id, f, v) => setPctRows((rows) => ({ ...rows, [key]: rows[key].map((r) => (r.id === id ? { ...r, [f]: v } : r)) }));
  const addRow = (key) => setPctRows((rows) => ({ ...rows, [key]: [...rows[key], { id: uid(), a: "", b: "" }] }));
  const delRow = (key, id) => setPctRows((rows) => ({ ...rows, [key]: rows[key].filter((r) => r.id !== id) }));
  const resetCard = (key) => setPctRows((rows) => ({ ...rows, [key]: [{ id: uid(), a: "", b: "" }] }));
  const saveHist = (cfg, row) => {
    const a = num(row.a), b = num(row.b), r = cfg.calc(a, b); if (r == null) { flash("数字を入力してください"); return; }
    setPctHist((h) => ({ ...h, [cfg.key]: [{ id: uid(), txt: cfg.text(a, b, r) }, ...h[cfg.key]].slice(0, 30) })); flash("履歴に保存");
  };
  const delHist = (key, id) => setPctHist((h) => ({ ...h, [key]: h[key].filter((x) => x.id !== id) }));
  const clearHist = (key) => setPctHist((h) => ({ ...h, [key]: [] }));

  const resetAll = () => {
    if (tab === "calc") { setExpr(""); setMemory(0); flash("クリアしました"); }
    else if (tab === "percent") { const o = {}; PCT.forEach((c) => (o[c.key] = [{ id: uid(), a: "", b: "" }])); setPctRows(o); flash("入力をリセット"); }
    else { setP1Rows([{ id: uid(), amount: "", rate: "" }]); setP2Amount(""); setP2Rates([{ id: uid(), val: "" }, { id: uid(), val: "" }]); flash("入力をリセット"); }
  };
  const onFieldKey = (e) => { if (e.key === "Enter") { e.preventDefault(); moveNext(e.target); } };

  return (
    <div className="app">
      <style>{STYLE}</style>
      <div className="topbar">
        <div className="wrap" style={{ padding: 0 }}>
          <div className="brand"><div className="dot maru">¥</div><h1 className="maru">ポイ活・マネ活 計算ツール</h1><span style={{fontSize:9,background:"var(--mint)",color:"var(--accent2)",padding:"2px 6px",borderRadius:4,fontFamily:"'Roboto Mono',monospace",fontWeight:700,letterSpacing:".04em"}}>v2</span></div>
          <div className="tabs">
            <button className={`tab ${tab === "calc" ? "active" : ""}`} onClick={() => setTab("calc")}><CalcIcon /> 計算機</button>
            <button className={`tab ${tab === "percent" ? "active" : ""}`} onClick={() => setTab("percent")}><Percent /> ％計算</button>
            <button className={`tab ${tab === "point" ? "active" : ""}`} onClick={() => setTab("point")}><Coins /> ポイ活</button>
          </div>
        </div>
      </div>

      <div className="wrap">
        {tab === "calc" && (
          <div className="card">
            <div className="disp">
              <div className="bar">
                <div className={`mem ${memory !== 0 ? "" : "off"}`}>M {fmt(memory)}</div>
                <div className="taxsel"><span className="lab">税率</span>
                  {[8, 10].map((r) => <button key={r} className={`taxbtn ${taxRate === r ? "on" : ""}`} onClick={() => setTaxRate(r)}>{r}%</button>)}
                </div>
              </div>
              <div className="feed" ref={feedRef}>
                {calcHist.length === 0 && <div className="feedempty">計算するとここに履歴が積み重なります</div>}
                {[...calcHist].reverse().map((h) => (
                  <div className="fline" key={h.id}>
                    <span className="e" onClick={() => { setExpr(h.res.replace(/,/g, "")); flash("読み込みました"); }}>{h.expr} = <b>{h.res}</b></span>
                    <button className="dx" onClick={() => setCalcHist((c) => c.filter((x) => x.id !== h.id))}><X size={13} /></button>
                  </div>
                ))}
              </div>
              <div className="current">
                <input ref={exprRef} className="exprInput" value={expr} placeholder="0" inputMode="text" spellCheck={false}
                  onChange={(e) => setExpr(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); doEquals(); } }} />
                <div className="resrow">
                  <span className="r">{expr.trim() === "" ? "" : (liveResult == null ? "…" : "= " + fmt(liveResult))}</span>
                  {liveResult != null && expr.trim() !== "" && (
                    <button className="miniCopy" onClick={async () => flash((await copyText(fmt(liveResult))) ? "コピーしました" : "選択してコピー")}><Copy size={14} /></button>
                  )}
                </div>
              </div>
            </div>
            <div className="pad">{KEYS.map((k, i) => <button key={i} className={`key ${k.c || ""}`} onClick={() => handleKey(k)}>{k.l}</button>)}</div>
            <div className="calcfoot">
              {calcHist.length > 0 && <button className="iconbtn danger" onClick={() => setCalcHist([])}><Trash2 /> 履歴を全削除</button>}
              <button className="iconbtn" onClick={() => { setExpr(""); flash("クリア"); }} style={{ marginLeft: "auto" }}><RotateCcw /> クリア</button>
            </div>
          </div>
        )}

        {tab === "percent" && (
          <>
            <div className="hint">空欄に数字を入れると即計算。Enter / Tab で次の欄へ</div>
            <div className="card">
              <div className="phead"><div className="t">パーセント計算（6種）</div></div>
              {PCT.map((cfg) => (
                <PctBlock key={cfg.key} cfg={cfg} rows={pctRows[cfg.key]} setRowVal={setRowVal} addRow={addRow} delRow={delRow}
                  resetCard={resetCard} saveHist={saveHist} hist={pctHist[cfg.key]} delHist={delHist} clearHist={clearHist}
                  open={!!openHist[cfg.key]} toggle={() => setOpenHist((o) => ({ ...o, [cfg.key]: !o[cfg.key] }))} onFieldKey={onFieldKey} />
              ))}
            </div>
            <button className="bigreset" onClick={resetAll}>すべてリセット</button>
          </>
        )}

        {tab === "point" && (
          <PointTab p1Rows={p1Rows} setP1Rows={setP1Rows} p1Hist={p1Hist} setP1Hist={setP1Hist} p1Open={p1Open} setP1Open={setP1Open}
            p2Amount={p2Amount} setP2Amount={setP2Amount} p2Rates={p2Rates} setP2Rates={setP2Rates} p2Hist={p2Hist} setP2Hist={setP2Hist}
            p2Open={p2Open} setP2Open={setP2Open} onFieldKey={onFieldKey} flash={flash} resetAll={resetAll} />
        )}
      </div>
      {toast && <div className="toast"><Check size={14} />{toast}</div>}
    </div>
  );
}

/* ============================ PctBlock (dense) ============================ */
function PctBlock({ cfg, rows, setRowVal, addRow, delRow, resetCard, saveHist, hist, delHist, clearHist, open, toggle, onFieldKey }) {
  return (
    <div className="pblock">
      {rows.map((row, ri) => {
        const a = num(row.a), b = num(row.b), r = cfg.calc(a, b), ok = r != null;
        return (
          <div className="prow" key={row.id}>
            <div className="sentence">
              {ri === 0 && <span className="nbox">{cfg.n}</span>}
              {cfg.tokens.map((tk, i) => {
                if (tk === "a") return <input key={i} className="field fieldnav" value={row.a} placeholder={cfg.pa} inputMode="decimal" onKeyDown={onFieldKey} onChange={(e) => setRowVal(cfg.key, row.id, "a", e.target.value)} />;
                if (tk === "b") return <input key={i} className="field fieldnav" value={row.b} placeholder={cfg.pb} inputMode="decimal" onKeyDown={onFieldKey} onChange={(e) => setRowVal(cfg.key, row.id, "b", e.target.value)} />;
                if (tk === "ans") return <span key={i} className={`ans ${ok ? "" : "empty"}`}><span className="qt">『</span>{ok ? fmt(r) : "—"}<span className="qt">』</span></span>;
                if (tk === "%") return <span key={i}>%</span>;
                return <span key={i}>{tk}</span>;
              })}
              {rows.length > 1 && <button className="tbtn del" onClick={() => delRow(cfg.key, row.id)} title="この行を削除"><X size={13} /></button>}
            </div>
            <div className="subline">
              <span className="formula">{ok ? cfg.formula(a, b, r) : "—"}</span>
              {ri === 0 && (
                <div className="tools">
                  <button className="tbtn" title="行を追加して比較" onClick={() => addRow(cfg.key)}><Plus size={13} /></button>
                  <button className="tbtn" title="履歴に保存" onClick={() => saveHist(cfg, row)}><Clock size={13} /></button>
                  <button className="tbtn" title="入力をリセット" onClick={() => resetCard(cfg.key)}><RotateCcw size={13} /></button>
                  <button className="tbtn" title="保存した履歴" onClick={toggle}>{open ? <ChevronUp size={13} /> : <ChevronDown size={13} />}</button>
                </div>
              )}
            </div>
          </div>
        );
      })}
      {open && (
        <div className="histbox">
          {hist.length === 0 && <div className="histempty">保存した計算はありません</div>}
          {hist.map((h) => (
            <div className="histitem" key={h.id}><span className="txt">{h.txt}</span>
              <button className="delx" onClick={() => delHist(cfg.key, h.id)}><X size={13} /></button></div>
          ))}
          {hist.length > 0 && <button className="iconbtn danger" style={{ marginTop: 5 }} onClick={() => clearHist(cfg.key)}><Trash2 /> 全削除</button>}
        </div>
      )}
    </div>
  );
}

/* ============================ PointTab ============================ */
function PointTab(props) {
  const { p1Rows, setP1Rows, p1Hist, setP1Hist, p1Open, setP1Open, p2Amount, setP2Amount, p2Rates, setP2Rates, p2Hist, setP2Hist, p2Open, setP2Open, onFieldKey, flash, resetAll } = props;
  const setP1 = (id, f, v) => setP1Rows((rs) => rs.map((r) => (r.id === id ? { ...r, [f]: v } : r)));
  const saveP1 = (row) => { const amt = num(row.amount), rate = num(row.rate); if (amt == null || rate == null) { flash("数字を入力"); return; } const pt = amt * rate / 100; setP1Hist((h) => [{ id: uid(), txt: `${fmt(amt)}円 ×${fmt(rate)}% → ${fmt(pt)}pt / 実質${fmt(amt - pt)}円` }, ...h].slice(0, 30)); flash("履歴に保存"); };
  const setRate = (id, v) => setP2Rates((rs) => rs.map((r) => (r.id === id ? { ...r, val: v } : r)));
  const amt2 = num(p2Amount); const totalRate = p2Rates.reduce((s, r) => s + (num(r.val) || 0), 0);
  const totalPt = amt2 != null ? amt2 * totalRate / 100 : null; const net2 = amt2 != null ? amt2 - totalPt : null;
  const saveP2 = () => { if (amt2 == null) { flash("金額を入力"); return; } setP2Hist((h) => [{ id: uid(), txt: `${fmt(amt2)}円 計${fmt(totalRate)}% → ${fmt(totalPt)}pt / 実質${fmt(net2)}円` }, ...h].slice(0, 30)); flash("履歴に保存"); };

  return (
    <>
      <div className="hint">ポイント還元と実質価格をすばやく計算</div>
      <div className="card">
        <div className="phead"><div className="t"><span className="nbox">P1</span>還元ポイント・実質価格</div>
          <button className="tbtn" title="リセット" onClick={() => setP1Rows([{ id: uid(), amount: "", rate: "" }])}><RotateCcw size={13} /></button></div>
        {p1Rows.map((row) => {
          const amt = num(row.amount), rate = num(row.rate), ok = amt != null && rate != null, pt = ok ? amt * rate / 100 : null, net = ok ? amt - pt : null;
          return (
            <div className="pblock" key={row.id} style={{ paddingTop: 6 }}>
              <div className="sentence">
                <input className="field fieldnav" value={row.amount} placeholder="金額" inputMode="decimal" onKeyDown={onFieldKey} onChange={(e) => setP1(row.id, "amount", e.target.value)} />
                <span>円 ・還元</span>
                <input className="field fieldnav" value={row.rate} placeholder="％" inputMode="decimal" onKeyDown={onFieldKey} onChange={(e) => setP1(row.id, "rate", e.target.value)} />
                <span>%</span>
                {p1Rows.length > 1 && <button className="tbtn del" onClick={() => setP1Rows((rs) => rs.filter((x) => x.id !== row.id))}><X size={13} /></button>}
              </div>
              <div className="outgrid" style={{ gridTemplateColumns: "1fr 1fr" }}>
                <div className="outbox"><div className="lab">獲得ポイント</div><div className="val">{ok ? fmt(pt) + " pt" : "—"}</div></div>
                <div className="outbox alt"><div className="lab">実質価格</div><div className="val">{ok ? fmt(net) + " 円" : "—"}</div></div>
              </div>
              <div className="subline"><span className="formula" /><div className="tools"><button className="tbtn" title="履歴に保存" onClick={() => saveP1(row)}><Clock size={13} /></button></div></div>
            </div>
          );
        })}
        <div className="subline" style={{ marginTop: 8 }}>
          <button className="iconbtn" onClick={() => setP1Rows((rs) => [...rs, { id: uid(), amount: "", rate: "" }])}><Plus /> 行を追加（比較）</button>
          <button className="iconbtn" onClick={() => setP1Open((o) => !o)} style={{ marginLeft: "auto" }}><Clock /> 履歴 {p1Hist.length ? `(${p1Hist.length})` : ""}</button>
        </div>
        {p1Open && (
          <div className="histbox">
            {p1Hist.length === 0 && <div className="histempty">保存した計算はありません</div>}
            {p1Hist.map((h) => <div className="histitem" key={h.id}><span className="txt">{h.txt}</span><button className="delx" onClick={() => setP1Hist((x) => x.filter((y) => y.id !== h.id))}><X size={13} /></button></div>)}
            {p1Hist.length > 0 && <button className="iconbtn danger" style={{ marginTop: 5 }} onClick={() => setP1Hist([])}><Trash2 /> 全削除</button>}
          </div>
        )}
      </div>

      <div className="card">
        <div className="phead"><div className="t"><span className="nbox">P2</span>多重還元の合算</div>
          <button className="tbtn" title="リセット" onClick={() => { setP2Amount(""); setP2Rates([{ id: uid(), val: "" }, { id: uid(), val: "" }]); }}><RotateCcw size={13} /></button></div>
        <div className="pblock" style={{ paddingTop: 6 }}>
          <div className="sentence">
            <input className="field fieldnav" value={p2Amount} placeholder="金額" inputMode="decimal" onKeyDown={onFieldKey} onChange={(e) => setP2Amount(e.target.value)} /><span>円</span>
            {p2Rates.map((r, i) => (
              <span className="ratechip" key={r.id}>
                <span style={{ fontSize: 11, color: "var(--soft)" }}>還元{i + 1}</span>
                <input className="field fieldnav" value={r.val} placeholder="％" inputMode="decimal" onKeyDown={onFieldKey} onChange={(e) => setRate(r.id, e.target.value)} style={{ width: 56 }} /><span>%</span>
                {p2Rates.length > 1 && <button className="tbtn del" style={{ width: 20, height: 20 }} onClick={() => setP2Rates((rs) => rs.filter((x) => x.id !== r.id))}><X size={12} /></button>}
              </span>
            ))}
            <button className="tbtn" title="還元を追加" onClick={() => setP2Rates((rs) => [...rs, { id: uid(), val: "" }])}><Plus size={13} /></button>
          </div>
          <div className="outgrid" style={{ gridTemplateColumns: "1fr 1fr 1fr" }}>
            <div className="outbox"><div className="lab">合計還元率</div><div className="val">{fmt(totalRate)}%</div></div>
            <div className="outbox"><div className="lab">合計pt</div><div className="val">{totalPt != null ? fmt(totalPt) : "—"}</div></div>
            <div className="outbox alt"><div className="lab">実質価格</div><div className="val">{net2 != null ? fmt(net2) : "—"}</div></div>
          </div>
          <div className="subline" style={{ marginTop: 8 }}>
            <span className="formula" />
            <button className="iconbtn" onClick={saveP2}><Clock /> 保存</button>
            <button className="iconbtn" onClick={() => setP2Open((o) => !o)}><Clock /> 履歴 {p2Hist.length ? `(${p2Hist.length})` : ""}</button>
          </div>
          {p2Open && (
            <div className="histbox">
              {p2Hist.length === 0 && <div className="histempty">保存した計算はありません</div>}
              {p2Hist.map((h) => <div className="histitem" key={h.id}><span className="txt">{h.txt}</span><button className="delx" onClick={() => setP2Hist((x) => x.filter((y) => y.id !== h.id))}><X size={13} /></button></div>)}
              {p2Hist.length > 0 && <button className="iconbtn danger" style={{ marginTop: 5 }} onClick={() => setP2Hist([])}><Trash2 /> 全削除</button>}
            </div>
          )}
        </div>
      </div>
      <button className="bigreset" onClick={resetAll}>すべてリセット</button>
    </>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
